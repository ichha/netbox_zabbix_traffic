{% load static %}
<div class="card">
  <h5 class="card-header">Zabbix Interface Traffic</h5>
  <div class="card-body">
    <div
      class="zabbix-traffic-graph"
      data-interface-id="{{ interface.pk }}"
      data-hours="{{ graph_hours }}"
    >
      <canvas style="display: block; width: 100%;" height="360" aria-label="Zabbix traffic graph"></canvas>
      <div class="small text-muted mt-2" data-zabbix-traffic-status>
        Loading traffic from Zabbix...
      </div>
    </div>
  </div>
</div>
<script src="{% static 'netbox_zabbix_traffic/interface-graph.js' %}"></script>
